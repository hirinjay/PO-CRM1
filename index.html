<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Perpetual Order — Prospect CRM</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#ffffff;--bg2:#f7f7f5;--bg3:#f0efe9;
    --text:#1a1a18;--text2:#6b6b67;--text3:#9e9e98;
    --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
    --amber:#BA7517;--amber-bg:#FAEEDA;
    --blue:#185FA5;--blue-bg:#E6F1FB;--blue-mid:#378ADD;
    --green:#3B6D11;--green-bg:#EAF3DE;
    --red:#A32D2D;--red-bg:#FCEBEB;
    --radius:8px;--radius-lg:12px;
    --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --mono:'SF Mono','Fira Code',monospace;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg:#1c1c1a;--bg2:#252522;--bg3:#2e2e2b;
      --text:#f0efe9;--text2:#a0a09a;--text3:#6b6b67;
      --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
    }
  }
  body{font-family:var(--font);background:var(--bg3);color:var(--text);font-size:16px;line-height:1.5;min-height:100vh}
  .wrap{max-width:680px;margin:0 auto;padding:1.5rem 1rem;min-height:100vh;background:var(--bg);box-shadow:0 0 0 0.5px var(--border)}
  input,select,textarea{font-family:var(--font);font-size:14px;color:var(--text);background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius);padding:8px 10px;outline:none;transition:border-color 0.15s}
  input:focus,select:focus,textarea:focus{border-color:var(--blue-mid)}
  button{font-family:var(--font);font-size:14px;font-weight:500;color:var(--text);background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius);padding:8px 16px;cursor:pointer;transition:background 0.12s,transform 0.1s}
  button:hover:not(:disabled){background:var(--bg3)}
  button:active:not(:disabled){transform:scale(0.98)}
  button:disabled{opacity:0.5;cursor:not-allowed}
  textarea{resize:vertical;min-height:70px}
  .lbl{display:block;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:4px}
  .fld{margin-bottom:14px}
  .fld input,.fld select,.fld textarea{width:100%}
  .hint{font-size:12px;color:var(--amber);margin-bottom:6px;font-style:italic;line-height:1.5}
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:10px}
  .sec-title{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:12px;padding-bottom:6px;border-bottom:0.5px solid var(--border)}
  .script-line{background:var(--bg2);border-left:2px solid var(--amber);border-radius:0 8px 8px 0;padding:10px 14px;font-size:13px;line-height:1.65;margin-bottom:8px}
  .prose-frame{background:var(--bg2);border-left:2px solid var(--amber);border-radius:0 8px 8px 0;padding:10px 14px;font-size:13px;line-height:1.65;margin-bottom:20px}
  .tabs{display:flex;gap:2px;border-bottom:0.5px solid var(--border);margin-bottom:20px}
  .tab-btn{padding:8px 16px;font-size:14px;font-weight:500;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;color:var(--text2);border-radius:0}
  .tab-btn.on{color:var(--text);border-bottom:2px solid var(--text)}
  .pick-item{padding:10px 14px;margin-bottom:6px;border-radius:var(--radius);cursor:pointer;font-size:14px;border:0.5px solid var(--border);background:var(--bg2);color:var(--text)}
  .pick-item.sel{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-mid);font-weight:500}
  .badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:6px;display:inline-block;flex-shrink:0}
  .err{color:var(--red);font-size:13px;margin:8px 0}
  .prospect-row{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border-color 0.12s}
  .prospect-row:hover{border-color:var(--border2)}
  .empty{text-align:center;padding:3rem 1rem;color:var(--text3)}
  .save-msg-ok{color:var(--green);font-size:12px}
  .save-msg-err{color:var(--red);font-size:12px}
  @media(max-width:500px){.g2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div id="root"></div>
</div>
<script>
const F={BIZ:'Business Name',OWN:'Owner Name',PH:'Phone',EM:'Email',WEB:'Website',STG:'Stage',OUT:'Call Outcome',FUP:'Follow Up Date',CN:'Call Notes',MWK:'Missed Calls Per Week',JV:'Avg Job Value',MCP:'Missed Call Process',QMO:'Quotes Per Month',QFP:'Quote Follow Up Process',RVP:'Review Process',APP:'Appointment Process',DN:'Discovery Notes',LEG:'Legal Business Name',EIN:'EIN',ENT:'Legal Entity Type',ADR:'Business Address',CE:'Contact Email',CP:'Contact Phone',BID:'Brand ID',BST:'Brand State',CID:'Campaign ID',CST:'Campaign State',TDT:'TCR Submitted Date',SWN:'SignalWire Number',OBS:'Onboarding Status',OBN:'Onboarding Notes'};

const SCHEMA=[['Business Name','Text'],['Owner Name','Text'],['Phone','Phone Number'],['Email','Email'],['Website','URL'],['Stage','Single Select','Prospect · Zoom Booked · Trial Active · Paid · Lost'],['Call Outcome','Single Select','No Answer · Booked Zoom · Callback · Not Interested'],['Follow Up Date','Date'],['Call Notes','Long Text'],['Missed Calls Per Week','Text'],['Avg Job Value','Text'],['Missed Call Process','Long Text'],['Quotes Per Month','Text'],['Quote Follow Up Process','Long Text'],['Review Process','Long Text'],['Appointment Process','Long Text'],['Discovery Notes','Long Text'],['Legal Business Name','Text'],['EIN','Text'],['Legal Entity Type','Single Select','PRIVATE_PROFIT · PUBLIC_PROFIT · NON_PROFIT'],['Business Address','Text'],['Contact Email','Email'],['Contact Phone','Phone Number'],['Brand ID','Text'],['Brand State','Single Select','pending · approved · rejected'],['Campaign ID','Text'],['Campaign State','Single Select','pending · approved · rejected'],['TCR Submitted Date','Date'],['SignalWire Number','Text'],['Onboarding Status','Single Select','Not Started · Form Sent · TCR Pending · Live'],['Onboarding Notes','Long Text']];

const STAGE_COLORS={'Prospect':['#E6F1FB','#185FA5'],'Zoom Booked':['#FAEEDA','#854F0B'],'Trial Active':['#EAF3DE','#3B6D11'],'Paid':['#E1F5EE','#0F6E56'],'Lost':['#FCEBEB','#A32D2D']};

const DISC_QS=[
  {k:F.MWK,l:'Missed calls per week',h:'"How many calls do you miss in a typical week?"',t:'text',p:'e.g. 5–10'},
  {k:F.JV,l:'Avg job value',h:'"What does a typical job run you?"',t:'text',p:'e.g. $2,500'},
  {k:F.MCP,l:'Missed call process',h:'"What do you currently do when you see a missed call?"',t:'ta',p:'Their answer…'},
  {k:F.QMO,l:'Quotes that go cold / mo',h:'"How many quotes go out that you never hear back on?"',t:'text',p:'e.g. 3–5'},
  {k:F.QFP,l:'Quote follow-up process',h:'"When you send a quote, what\'s your follow-up process?"',t:'ta',p:'Their answer…'},
  {k:F.RVP,l:'Review collection',h:'"Are you actively collecting Google reviews after jobs?"',t:'ta',p:'Their answer…'},
  {k:F.APP,l:'Appointment process',h:'"When you schedule a job, what does the customer get?"',t:'ta',p:'Their answer…'},
];

const SAVED_KEY='po_crm_config';
let state={
  view:'setup',step:1,
  url:'',token:'',
  bases:[],selBase:'',
  tables:[],selTable:'',
  cfg:null,err:'',loading:false,showSchema:false,
  prospects:[],search:'',listLoading:false,
  current:null,form:{},tab:'call',
  saving:false,msg:'',scriptOpen:false,
};

// Persist config to localStorage so they don't re-enter every time
try{const saved=JSON.parse(localStorage.getItem(SAVED_KEY)||'null');if(saved?.url)Object.assign(state,{url:saved.url,token:saved.token,cfg:saved});}catch(e){}

const R=document.getElementById('root');

function mkNC(url,token){
  const h={'xc-token':token,'Content-Type':'application/json'};
  const b=url.replace(/\/$/,'');
  const ok=async r=>{if(!r.ok)throw new Error('HTTP '+r.status+' — check your URL and token');return r.json();};
  return{
    bases:()=>fetch(b+'/api/v2/meta/bases',{headers:h}).then(ok),
    tables:bid=>fetch(b+'/api/v2/meta/bases/'+bid+'/tables',{headers:h}).then(ok),
    list:(bid,tid)=>fetch(b+'/api/v2/db/data/noco/'+bid+'/'+tid+'?limit=100&sort=-Id',{headers:h}).then(ok),
    create:(bid,tid,d)=>fetch(b+'/api/v2/db/data/noco/'+bid+'/'+tid,{method:'POST',headers:h,body:JSON.stringify(d)}).then(ok),
    update:(bid,tid,id,d)=>fetch(b+'/api/v2/db/data/noco/'+bid+'/'+tid+'/'+id,{method:'PATCH',headers:h,body:JSON.stringify(d)}).then(ok),
  };
}

function set(patch){Object.assign(state,patch);render();}
function setForm(k,v){state.form={...state.form,[k]:v};render();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

async function step1(){
  if(!state.url||!state.token){set({err:'Both fields required'});return;}
  set({loading:true,err:''});
  try{const r=await mkNC(state.url,state.token).bases();set({bases:r.list||[],step:2});}
  catch(e){set({err:'Connection failed: '+e.message});}
  set({loading:false});
}
async function step2(){
  if(!state.selBase){set({err:'Pick a base'});return;}
  set({loading:true,err:''});
  try{const r=await mkNC(state.url,state.token).tables(state.selBase);set({tables:r.list||[],step:3});}
  catch(e){set({err:'Failed: '+e.message});}
  set({loading:false});
}
async function finish(){
  if(!state.selTable){set({err:'Pick a table'});return;}
  const cfg={url:state.url,token:state.token,baseId:state.selBase,tableId:state.selTable};
  try{localStorage.setItem(SAVED_KEY,JSON.stringify(cfg));}catch(e){}
  set({cfg,view:'loading'});
  await loadList(cfg,'');
  set({view:'list'});
}
async function loadList(cfg,q){
  set({listLoading:true});
  try{
    const r=await mkNC(cfg.url,cfg.token).list(cfg.baseId,cfg.tableId);
    const all=r.list||[];
    const ql=(q||'').toLowerCase();
    set({prospects:ql?all.filter(p=>((p[F.BIZ]||'')+(p[F.OWN]||'')).toLowerCase().includes(ql)):all});
  }catch(e){console.error(e);}
  set({listLoading:false});
}

// Auto-connect if we have saved config
if(state.cfg){
  state.view='loading';
  loadList(state.cfg,'').then(()=>set({view:'list'}));
}

function openNew(){set({current:null,form:{[F.STG]:'Prospect',[F.OBS]:'Not Started'},tab:'call',scriptOpen:false,view:'detail'});}
function openRecord(p){set({current:p,form:{...p},tab:'call',scriptOpen:false,view:'detail'});}
async function save(){
  set({saving:true,msg:''});
  try{
    const nc=mkNC(state.cfg.url,state.cfg.token);
    const id=state.current?.Id||state.current?.id;
    const saved=id?await nc.update(state.cfg.baseId,state.cfg.tableId,id,state.form):await nc.create(state.cfg.baseId,state.cfg.tableId,state.form);
    set({current:saved,form:{...saved},msg:'ok'});
    setTimeout(()=>set({msg:''}),2500);
    loadList(state.cfg,state.search);
  }catch(e){set({msg:'err:'+e.message});}
  set({saving:false});
}
function goList(){set({view:'list'});loadList(state.cfg,state.search);}
function disconnect(){
  try{localStorage.removeItem(SAVED_KEY);}catch(e){}
  set({view:'setup',step:1,cfg:null,url:'',token:'',selBase:'',selTable:'',bases:[],tables:[]});
}

function fld(label,key,type,opts,hint,placeholder){
  const val=esc(state.form[key]||'');
  const inp=type==='ta'
    ?`<textarea class="fld-input" data-key="${key}" placeholder="${placeholder||''}">${val}</textarea>`
    :type==='sel'
    ?`<select class="fld-input" data-key="${key}"><option value="">— select —</option>${opts.map(o=>`<option value="${esc(o)}"${(state.form[key]||'')=== o?' selected':''}>${esc(o)}</option>`).join('')}</select>`
    :`<input class="fld-input" data-key="${key}" type="${type||'text'}" value="${val}" placeholder="${esc(placeholder||'')}"/>`;
  return `<div class="fld">${label?`<label class="lbl">${label}</label>`:''}${hint?`<p class="hint">${hint}</p>`:''}${inp}</div>`;
}

function renderSetup(){
  let body='';
  const s=state;
  if(s.step===1){
    body=`
      <div class="fld"><label class="lbl">NocoDB URL</label><input id="inp-url" type="text" value="${esc(s.url)}" placeholder="https://nocodb.yourdomain.com" style="width:100%"/></div>
      <div class="fld"><label class="lbl">API Token</label><input id="inp-token" type="password" value="${esc(s.token)}" placeholder="your xc-token…" style="width:100%"/></div>
      ${s.err?`<p class="err">${esc(s.err)}</p>`:''}
      <button id="btn-step1" ${s.loading?'disabled':''}>${s.loading?'Connecting…':'Connect →'}</button>`;
  }else if(s.step===2){
    body=`<p style="font-size:13px;color:var(--text2);margin-bottom:10px">Select your base:</p>
      ${s.bases.map(b=>`<div class="pick-item${s.selBase===b.id?' sel':''}" data-pick-base="${b.id}">${esc(b.title)}</div>`).join('')}
      ${s.err?`<p class="err">${esc(s.err)}</p>`:''}
      <div style="display:flex;gap:8px;margin-top:12px">
        <button id="btn-back2">← Back</button>
        <button id="btn-step2" ${s.loading||!s.selBase?'disabled':''}>${s.loading?'Loading…':'Next →'}</button>
      </div>`;
  }else{
    body=`
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <p style="font-size:13px;color:var(--text2)">Select your table:</p>
        <button id="btn-toggle-schema" style="font-size:12px;color:var(--blue);background:none;border:none;cursor:pointer;padding:0;text-decoration:underline">${s.showSchema?'hide schema':'view required schema'}</button>
      </div>
      ${s.showSchema?`<div style="background:var(--bg2);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12px"><p style="font-weight:500;margin-bottom:8px">Create these fields in NocoDB:</p>${SCHEMA.map(([n,t,o])=>`<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:0.5px solid var(--border)"><span style="font-weight:500">${n}</span><span style="color:var(--text2);text-align:right;margin-left:8px">${t}${o?' — '+o:''}</span></div>`).join('')}</div>`:''}
      ${s.tables.map(t=>`<div class="pick-item${s.selTable===t.id?' sel':''}" data-pick-table="${t.id}">${esc(t.title)}</div>`).join('')}
      ${s.err?`<p class="err">${esc(s.err)}</p>`:''}
      <div style="display:flex;gap:8px;margin-top:12px">
        <button id="btn-back3">← Back</button>
        <button id="btn-finish" ${!s.selTable?'disabled':''}>Launch app →</button>
      </div>`;
  }
  return `
    <p style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:4px">Perpetual Order</p>
    <h1 style="font-size:20px;font-weight:500;margin-bottom:4px">Connect to NocoDB</h1>
    <p style="font-size:13px;color:var(--text2);margin-bottom:24px;line-height:1.6">Step ${s.step} of 3 — ${s.step===1?'Enter credentials':s.step===2?'Select base':'Select table'}</p>
    <div style="max-width:440px">${body}</div>`;
}

function renderList(){
  const s=state;
  const rows=s.prospects.map(p=>{
    const [bg,fg]=(STAGE_COLORS[p[F.STG]]||['#F1EFE8','#5F5E5A']);
    return `<div class="prospect-row" style="border-left:3px solid ${fg}" data-open="${p.Id||p.id}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div style="min-width:0;flex:1">
          <p style="font-weight:500;font-size:15px;margin-bottom:2px">${esc(p[F.BIZ]||'Unnamed')}</p>
          <p style="font-size:12px;color:var(--text2)">${[p[F.OWN],p[F.PH]].filter(Boolean).map(esc).join(' · ')}</p>
        </div>
        <span class="badge" style="background:${bg};color:${fg};margin-left:8px">${esc(p[F.STG]||'Prospect')}</span>
      </div>
      ${p[F.FUP]?`<p style="font-size:12px;color:var(--amber);margin-top:6px"><i class="ti ti-calendar" style="font-size:12px;margin-right:4px"></i>Follow up: ${esc(p[F.FUP])}</p>`:''}
      ${p[F.OUT]?`<p style="font-size:12px;color:var(--text3);margin-top:2px">Last: ${esc(p[F.OUT])}</p>`:''}
    </div>`;
  }).join('');
  return `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div>
        <p style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--text3)">Perpetual Order</p>
        <h1 style="font-size:18px;font-weight:500">Prospects</h1>
      </div>
      <button id="btn-new">+ New</button>
    </div>
    <input id="inp-search" value="${esc(s.search)}" placeholder="Search by name…" style="width:100%;font-size:14px;margin-bottom:14px"/>
    ${s.listLoading?'<p style="color:var(--text2);font-size:14px;padding:1rem 0">Loading…</p>':''}
    ${!s.listLoading&&s.prospects.length===0?`<div class="empty"><i class="ti ti-phone-off" style="font-size:28px;display:block;margin-bottom:8px"></i><p style="font-size:14px;margin-bottom:12px">No prospects yet</p><button id="btn-new2">Add first prospect</button></div>`:''}
    ${rows}
    <div style="margin-top:24px;padding-top:16px;border-top:0.5px solid var(--border)">
      <button id="btn-disconnect" style="font-size:12px;color:var(--text3)">⚙ Change connection</button>
    </div>`;
}

function renderDetail(){
  const s=state;
  const scriptHTML=s.scriptOpen?`<div class="card" style="margin-bottom:16px">
    <p class="sec-title">Cold call script</p>
    <p class="lbl">Opening</p>
    <div class="script-line">"Hey, is this [Name]? — Hey [Name], this is Hirinjay. I'll be quick. Do you ever miss calls when you're out on a job?"</div>
    <p class="lbl" style="margin-top:12px">If yes</p>
    <div class="script-line">"Yeah, that's exactly why I'm calling. I help contractors recover revenue they're already losing — missed calls, quotes that go cold, jobs with no follow-up. I give away the first piece free — an automatic text-back whenever you miss a call. Worth a quick Zoom to see the bigger picture?"</div>
    <p class="lbl" style="margin-top:12px">Book it</p>
    <div class="script-line">"I've got [day] or [day] — which works? I'll send you a link so you can test it before we talk."</div>
    <p class="lbl" style="margin-top:12px">Price comes up</p>
    <div class="script-line">"First 30 days free, then $297/mo. One recovered job pays for months."</div>
    <p class="lbl" style="margin-top:12px">Voicemail</p>
    <div class="script-line">"Hey [Name], this is Hirinjay — I help contractors make sure calls like this don't go unanswered. I'll try back, or call me at [number]."</div>
  </div>`:'';

  const callTab=`
    <div style="margin-bottom:16px">
      <button id="btn-script" style="font-size:12px;color:var(--blue);background:none;border:0.5px solid var(--blue);border-radius:6px;padding:4px 12px;cursor:pointer">
        ${s.scriptOpen?'↑ Hide script':'↓ Show script'}
      </button>
    </div>
    ${scriptHTML}
    <div class="g2">
      ${fld('Call Outcome',F.OUT,'sel',['No Answer','Booked Zoom','Callback','Not Interested'])}
      ${fld('Follow Up Date',F.FUP,'date')}
    </div>
    ${fld('Call Notes',F.CN,'ta',null,null,'Tone, objections, what they mentioned…')}`;

  const discTab=`
    <div class="prose-frame"><strong style="font-weight:500">Frame:</strong> "What I want to do today is find where you're losing money you don't have to be. There are usually four spots — let's just walk through them."</div>
    ${DISC_QS.map(q=>`<div class="card"><p class="lbl">${q.l}</p><p class="hint">${q.h}</p>${fld('',q.k,q.t,null,null,q.p)}</div>`).join('')}
    ${fld('Discovery Notes',F.DN,'ta',null,null,'Overall impression, fit, next steps…')}`;

  const onbTab=`
    <p class="sec-title">TCR registration info</p>
    <div class="g2">
      ${fld('Legal Business Name',F.LEG,'text',null,null,'Acme Plumbing LLC')}
      ${fld('EIN',F.EIN,'text',null,null,'12-3456789')}
      ${fld('Legal Entity Type',F.ENT,'sel',['PRIVATE_PROFIT','PUBLIC_PROFIT','NON_PROFIT'])}
      ${fld('Contact Phone',F.CP,'text',null,null,'+12085550100')}
    </div>
    ${fld('Business Address',F.ADR,'text',null,null,'123 Main St, Nampa ID 83651')}
    ${fld('Contact Email',F.CE,'text',null,null,'john@acmeplumbing.com')}
    <p class="sec-title" style="margin-top:20px">Registration status</p>
    <div class="g2">
      ${fld('Onboarding Status',F.OBS,'sel',['Not Started','Form Sent','TCR Pending','Live'])}
      ${fld('TCR Submitted Date',F.TDT,'date')}
      ${fld('Brand ID',F.BID,'text',null,null,'UUID from SignalWire')}
      ${fld('Brand State',F.BST,'sel',['pending','approved','rejected'])}
      ${fld('Campaign ID',F.CID,'text',null,null,'Campaign UUID')}
      ${fld('Campaign State',F.CST,'sel',['pending','approved','rejected'])}
    </div>
    ${fld('SignalWire Number',F.SWN,'text',null,null,'+12085550200')}
    ${fld('Onboarding Notes',F.OBN,'ta',null,null,'Setup notes, issues, comms with client…')}`;

  const msgEl=s.msg?`<span class="${s.msg==='ok'?'save-msg-ok':'save-msg-err'}">${s.msg==='ok'?'Saved ✓':esc(s.msg.replace('err:',''))}</span>`:'';

  return `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <button id="btn-back" style="padding:6px 10px;font-size:13px;flex-shrink:0">← Back</button>
      <div style="flex:1;min-width:0">
        <p style="font-weight:500;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(s.form[F.BIZ]||'New prospect')}</p>
        ${s.form[F.OWN]?`<p style="font-size:12px;color:var(--text2)">${esc(s.form[F.OWN])}</p>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
        ${msgEl}
        <button id="btn-save" ${s.saving?'disabled':''}>${s.saving?'Saving…':'Save'}</button>
      </div>
    </div>
    <div class="card">
      <div class="g2">
        ${fld('Business Name',F.BIZ,'text',null,null,'Acme Plumbing')}
        ${fld('Owner Name',F.OWN,'text',null,null,'John Smith')}
        ${fld('Phone',F.PH,'text',null,null,'(208) 555-0100')}
        ${fld('Email',F.EM,'text',null,null,'john@acme.com')}
        ${fld('Stage',F.STG,'sel',['Prospect','Zoom Booked','Trial Active','Paid','Lost'])}
        ${fld('Website',F.WEB,'text',null,null,'acmeplumbing.com')}
      </div>
    </div>
    <div class="tabs">
      ${[['call','Call'],['discovery','Discovery'],['onboarding','Onboarding']].map(([k,l])=>`<button class="tab-btn${s.tab===k?' on':''}" data-tab="${k}">${l}</button>`).join('')}
    </div>
    ${s.tab==='call'?callTab:s.tab==='discovery'?discTab:onbTab}`;
}

function render(){
  const s=state;
  if(s.view==='setup')R.innerHTML=renderSetup();
  else if(s.view==='list')R.innerHTML=renderList();
  else if(s.view==='detail')R.innerHTML=renderDetail();
  else R.innerHTML=`<p style="color:var(--text2);font-size:14px;padding:2rem 0">Connecting…</p>`;
  attachListeners();
}

function attachListeners(){
  const on=(id,ev,fn)=>{const el=document.getElementById(id);if(el)el.addEventListener(ev,fn);};
  on('btn-step1','click',step1);
  on('btn-step2','click',step2);
  on('btn-back2','click',()=>set({step:1,err:''}));
  on('btn-back3','click',()=>set({step:2,err:''}));
  on('btn-finish','click',finish);
  on('btn-toggle-schema','click',()=>set({showSchema:!state.showSchema}));
  on('inp-url','input',e=>set({url:e.target.value}));
  on('inp-token','input',e=>set({token:e.target.value}));
  on('btn-new','click',openNew);
  on('btn-new2','click',openNew);
  on('btn-disconnect','click',disconnect);
  on('inp-search','input',e=>{state.search=e.target.value;loadList(state.cfg,e.target.value);});
  on('btn-back','click',goList);
  on('btn-save','click',save);
  on('btn-script','click',()=>set({scriptOpen:!state.scriptOpen}));
  document.querySelectorAll('[data-pick-base]').forEach(el=>el.addEventListener('click',()=>set({selBase:el.dataset.pickBase})));
  document.querySelectorAll('[data-pick-table]').forEach(el=>el.addEventListener('click',()=>set({selTable:el.dataset.pickTable})));
  document.querySelectorAll('[data-tab]').forEach(el=>el.addEventListener('click',()=>set({tab:el.dataset.tab})));
  document.querySelectorAll('.fld-input').forEach(el=>el.addEventListener('input',e=>setForm(e.target.dataset.key,e.target.value)));
  document.querySelectorAll('[data-open]').forEach(el=>el.addEventListener('click',()=>{
    const id=el.dataset.open;
    const p=state.prospects.find(x=>String(x.Id||x.id)===String(id));
    if(p)openRecord(p);
  }));
}

render();
</script>
</body>
</html>
